name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: passkeys-rescue-darwin-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: passkeys-rescue-darwin-x64

          # Linux
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: passkeys-rescue-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: passkeys-rescue-linux-arm64

          # Windows
          - target: bun-windows-x64
            os: ubuntu-latest
            artifact: passkeys-rescue-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build for ${{ matrix.target }}
        run: bun build --compile --target=${{ matrix.target }} src/index.ts --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x artifacts/passkeys-rescue-darwin-* artifacts/passkeys-rescue-linux-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/passkeys-rescue-darwin-arm64
            artifacts/passkeys-rescue-darwin-x64
            artifacts/passkeys-rescue-linux-x64
            artifacts/passkeys-rescue-linux-arm64
            artifacts/passkeys-rescue-windows-x64.exe
